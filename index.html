<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rasira RWO System</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#F0F4F0;color:#111;}
#pg_login{min-height:100vh;background:linear-gradient(135deg,#0D3320,#1A6B2A);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.lcard{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:380px;margin-top:16px;}
.lcard h3{color:#1A6B2A;font-size:14px;font-weight:800;text-align:center;margin-bottom:18px;text-transform:uppercase;letter-spacing:.5px;}
.sbtn{width:100%;padding:13px 14px;margin-bottom:8px;border:2px solid #DDE3DD;border-radius:10px;background:#F8FAF8;cursor:pointer;display:flex;align-items:center;gap:12px;font-size:14px;text-align:left;transition:.15s;}
.sbtn:hover{border-color:#1A6B2A;background:#E8F5E9;}
.sico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.sbtn h4{font-size:14px;font-weight:700;margin:0;}
.sbtn small{font-size:11px;color:#666;}
#pg_app{display:none;flex-direction:column;min-height:100vh;}
.topbar{background:#0D3320;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.tbl{width:32px;height:32px;border-radius:50%;background:#fff;overflow:hidden;flex-shrink:0;}
.tbl img{width:100%;height:100%;object-fit:contain;}
.tbn{font-size:13px;font-weight:900;color:#fff;}
.tbs{font-size:11px;color:rgba(255,255,255,.6);}
.tbr{display:flex;align-items:center;gap:7px;}
.sync-l{font-size:11px;color:rgba(255,255,255,.6);}
.cnt{background:rgba(255,255,255,.15);padding:3px 10px;border-radius:12px;font-size:12px;color:#fff;font-weight:700;}
.flag{height:4px;background:linear-gradient(to right,#20603D 33%,#FAD201 33%,#FAD201 66%,#20603D 66%);}
.sbar{background:#fff;padding:8px 14px;border-bottom:1px solid #DDE3DD;display:flex;gap:8px;align-items:center;}
.si{flex:1;padding:8px 11px;border:1.5px solid #DDE3DD;border-radius:8px;font-size:14px;}
.si:focus{outline:none;border-color:#1A6B2A;}
#sres{background:#fff;border-bottom:1px solid #DDE3DD;}
.main{flex:1;padding:14px;max-width:880px;margin:0 auto;width:100%;}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.f{margin-bottom:11px;}
.f label{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px;}
.f input,.f select,.f textarea{width:100%;padding:9px 11px;border:1.5px solid #DDE3DD;border-radius:8px;font-size:14px;font-family:Arial;}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:#1A6B2A;}
.f textarea{resize:none;height:68px;}
.req{color:#C8201A;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.sc{background:#fff;border-radius:10px;padding:11px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.snum{font-size:22px;font-weight:900;color:#1A6B2A;}
.slbl{font-size:9px;color:#666;font-weight:700;text-transform:uppercase;margin-top:2px;}
.ql{display:flex;flex-direction:column;gap:7px;}
.qi{background:#fff;border:1px solid #DDE3DD;border-radius:10px;padding:11px 13px;display:flex;align-items:center;gap:9px;}
.qn{width:34px;height:34px;border-radius:8px;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qinfo{flex:1;min-width:0;}
.qname{font-size:13px;font-weight:700;}
.qmeta{font-size:11px;color:#666;margin-top:2px;}
.qbtns{display:flex;gap:4px;flex-shrink:0;}
.btn{padding:9px 15px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:Arial;transition:.15s;}
.bG{background:#1A6B2A;color:#fff;width:100%;padding:12px;font-size:13px;}
.bG:hover{background:#0D3320;}
.bB{background:#1565C0;color:#fff;}
.bO{background:#E8A020;color:#111;}
.bP{background:#6A1B9A;color:#fff;}
.bT{background:#00695C;color:#fff;}
.bX{background:transparent;color:#555;border:1.5px solid #DDE3DD;}
.bX:hover{border-color:#1A6B2A;color:#1A6B2A;}
.bsm{padding:5px 10px;font-size:11px;}
.sh{border-radius:8px;padding:8px 13px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.sh h3{font-size:11px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.4px;margin:0;}
.sh span{font-size:10px;color:rgba(255,255,255,.75);}
.shG{background:#1A6B2A;}.shR{background:#C8201A;}.shB{background:#1565C0;}
.shY{background:#E8A020;}.shP{background:#6A1B9A;}.shT{background:#00695C;}.shGR{background:#555;}
.dc{border-radius:10px;padding:13px;margin-bottom:11px;}
.dcG{background:#E8F5E9;}.dcB{background:#E3F2FD;}.dcP{background:#F3E5F5;}
.dcY{background:#FFFBF0;}.dcT{background:#E0F2F1;}
.dc h4{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;margin-bottom:7px;}
.dcG h4{color:#1A6B2A;}.dcB h4{color:#1565C0;}.dcP h4{color:#6A1B9A;}
.dcY h4{color:#8B6508;}.dcT h4{color:#00695C;}
.dr{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid rgba(0,0,0,.06);}
.dr:last-child{border:none;}
.dr span:first-child{color:#666;font-weight:600;}.dr span:last-child{font-weight:700;text-align:right;}
.vr{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #eee;}
.vr:last-child{border:none;}
.vr label{width:180px;font-size:12px;font-weight:700;color:#555;flex-shrink:0;}
.vr input,.vr select{flex:1;padding:7px 10px;border:1.5px solid #DDE3DD;border-radius:7px;font-size:13px;}
.vr input:focus,.vr select:focus{outline:none;border-color:#1A6B2A;}
.vr .unit{font-size:11px;color:#666;width:50px;flex-shrink:0;}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:center;justify-content:center;padding:14px;}
.mo.open{display:flex;}
.mb{background:#fff;border-radius:14px;padding:20px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;position:relative;}
.mt{font-size:15px;font-weight:800;color:#1A6B2A;margin-bottom:12px;padding-right:24px;}
.al{padding:9px 12px;border-radius:8px;margin-bottom:10px;font-size:13px;font-weight:600;}
.aOK{background:#E8F5E9;color:#1A6B2A;}.aER{background:#FFF0F0;color:#C8201A;}
.bdg{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;}
.emp{text-align:center;padding:28px;color:#666;}
.svcs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:12px;}
.svc{border:2px solid #DDE3DD;border-radius:10px;padding:14px 10px;text-align:center;cursor:pointer;background:#fafafa;transition:.15s;}
.svc.eye{border-color:#1565C0;background:#E3F2FD;}
.svc.ncd{border-color:#1A6B2A;background:#E8F5E9;}
.svc.ch{border-color:#E8A020;background:#FFFBF0;}
.sck{display:none;font-size:16px;margin-top:4px;}
.eye .sck,.ncd .sck,.ch .sck{display:block;}
.flow{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:13px;}
.fp{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:700;border:2px solid;}
.fdone{background:#E8F5E9;border-color:#1A6B2A;color:#1A6B2A;}
.fact{background:#1A6B2A;border-color:#1A6B2A;color:#fff;}
.fwait{background:#F5F5F5;border-color:#ddd;color:#999;}
.rxi{background:#fafafa;border:1px solid #DDE3DD;border-radius:8px;padding:8px 11px;margin-bottom:6px;display:flex;gap:7px;align-items:center;}
.rxi input{flex:1;border:none;background:transparent;font-size:13px;outline:none;}
.rxi button{background:none;border:none;color:#C8201A;cursor:pointer;font-size:14px;}
.abox{background:#E8F5E9;border-radius:8px;padding:12px;margin-bottom:11px;}
.atitle{font-size:10px;font-weight:800;color:#1A6B2A;text-transform:uppercase;letter-spacing:.3px;margin-bottom:9px;}
.oi{width:100%;margin-top:6px;padding:8px 11px;border:1.5px solid #DDE3DD;border-radius:7px;font-size:13px;font-family:Arial;display:none;}
.oi:focus{outline:none;border-color:#1A6B2A;}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:12px;padding:24px 28px;box-shadow:0 6px 32px rgba(0,0,0,.2);text-align:center;z-index:200;min-width:200px;}
.brow{display:flex;align-items:center;gap:7px;font-size:11px;margin-bottom:5px;}
.blbl{width:80px;color:#666;font-weight:600;flex-shrink:0;}
.bbar{flex:1;background:#eee;border-radius:3px;height:12px;overflow:hidden;}
.bfil{height:100%;border-radius:3px;}
.bval{width:24px;text-align:right;font-weight:700;}
.sug{position:absolute;left:0;right:0;background:#fff;border:1.5px solid #1A6B2A;border-top:none;border-radius:0 0 8px 8px;z-index:40;max-height:180px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.12);}
.sug-item{padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid #f0f0f0;}
.sug-item:hover,.sug-item.active{background:#E8F5E9;color:#1A6B2A;font-weight:700;}
.sug-item:last-child{border-bottom:none;}
@media(max-width:560px){.stats{grid-template-columns:1fr 1fr;}.g2,.g3,.svcs{grid-template-columns:1fr;}.main{padding:10px;}.vr{flex-direction:column;align-items:flex-start;}.vr label{width:100%;}}
</style>
</head>

  else if(a==='callTriage') {closeMo();callTriage(id);}
  else if(a==='openEye') {closeMo();openEye(id);}

  else if(a==='editEyeChoice') openEye(id,true);

    var sel=document.getElementById(btn.dataset.sel);

    // handled by onchange below
  }
});

function td(){var n=new Date();var y=n.getFullYear();var m=String(n.getMonth()+1).padStart(2,'0');var d=String(n.getDate()).padStart(2,'0');return y+'-'+m+'-'+d;}
function tdDisp(iso){if(!iso)return'';var p=iso.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:iso;}
function tn(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function gv(id){var e=document.getElementById(id);return e?e.value.trim():'';}
function byId(id){for(var i=0;i<pts.length;i++)if(pts[i].id===id)return pts[i];return null;}
function retryPush(){
  if(!pts.length){alert('No patients in local storage to push.');return;}
  if(!confirm('Push all '+pts.length+' patients from this device to the server?'))return;
  sSet('Pushing...');
  var done=0,failed=0,total=pts.length;
  function next(i){
    if(i>=total){
      var msg='Push complete: '+done+' saved, '+failed+' failed';
      sSet(msg);
      alert(msg);
      sync();
      return;
    }
    var p=pts[i];
    sbReq('POST','patients',[toRow(p)],function(s){
      if(s===200||s===201){done++;next(i+1);}
      else{
        sbReq('PATCH','patients?id=eq.'+p.id,toRow(p),function(s2){
          if(s2===200||s2===204)done++;else failed++;
          next(i+1);
        });
      }
    });
  }
  next(0);
}
function nxt(){return pts.filter(function(p){return p.date===td();}).length+1;}
function svL(){try{localStorage.setItem(KEY,JSON.stringify(pts));}catch(e){}}

// &#9472;&#9472; STAT CARD CLICK &#8212; show patient list in modal &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
function showStatList(filter){
  var d=td();
  var title='',list=[];
  if(filter==='waiting-triage') { title='&#9201; Waiting for Triage'; list=pts.filter(function(p){return p.status==='waiting'&&p.service!=='Children Under 5';}); }
  else if(filter==='in-triage')  { title='&#129658; In Triage';        list=pts.filter(function(p){return p.status==='triage';}); }
  else if(filter==='done-today') { title='&#9989; Done Today';        list=pts.filter(function(p){return p.date===d&&p.status==='done';}); }
  else if(filter==='child-u5')   { title='&#128118; Children Under 5'; list=pts.filter(function(p){return p.date===d&&p.service==='Children Under 5';}); }
  else if(filter==='eye-waiting'){ title='&#128065; Waiting &#8212; Eye';   list=pts.filter(function(p){return p.status==='eye-consult';}); }
  else if(filter==='eye-served') { title='&#128065; Served &#8212; Eye';    list=pts.filter(function(p){return p.service.indexOf('Eye')>=0&&p.eyeConsult&&p.status!=='eye-consult';}); }
  else if(filter==='eye-total')  { title='&#128065; Total Eye Today'; list=pts.filter(function(p){return p.date===d&&p.service.indexOf('Eye')>=0;}); }
  else if(filter==='ncd-waiting'){ title='&#129658; Waiting &#8212; NCD';   list=pts.filter(function(p){return p.status==='ncd-consult';}); }
  else if(filter==='ncd-served') { title='&#129658; Served &#8212; NCD';    list=pts.filter(function(p){return p.service.indexOf('NCD')>=0&&p.ncdConsult&&p.status!=='ncd-consult';}); }
  else if(filter==='ncd-total')  { title='&#129658; Total NCD Today'; list=pts.filter(function(p){return p.date===d&&p.service.indexOf('NCD')>=0;}); }
  else if(filter==='child-waiting'){title='&#128118; Waiting &#8212; Child'; list=pts.filter(function(p){return p.status==='child-service';}); }
  else if(filter==='child-served'){title='&#128118; Served &#8212; Child';   list=pts.filter(function(p){return p.service==='Children Under 5'&&p.childConsult&&p.status!=='child-service';}); }
  else if(filter==='in-pharmacy') { title='&#128138; In Pharmacy';     list=pts.filter(function(p){return p.status==='pharmacy';}); }
  else if(filter==='rec-total')   { title='&#128203; Total Today';     list=pts.filter(function(p){return p.date===d;}); }
  else if(filter==='rec-waiting') { title='&#9201; Waiting';         list=pts.filter(function(p){return p.date===d&&p.status==='waiting';}); }
  else if(filter==='rec-active')  { title='&#128260; Active';          list=pts.filter(function(p){return p.date===d&&p.status!=='waiting'&&p.status!=='done';}); }
  else if(filter==='rec-done')    { title='&#9989; Done';             list=pts.filter(function(p){return p.date===d&&p.status==='done';}); }
  else if(filter==='pharm-waiting'){title='&#128138; Waiting for Pharmacy'; list=pts.filter(function(p){return p.status==='pharmacy';}); }
  else if(filter==='pharm-done')  { title='&#9989; Discharged Today'; list=pts.filter(function(p){return p.date===d&&p.status==='done';}); }
  if(!list.length){openMo('<div class="mt">'+title+'</div><div class="emp" style="padding:24px;"><div style="font-size:32px;margin-bottom:8px;">&#128269;</div><div>No patients in this group</div></div><button class="btn bX" style="width:100%;padding:11px;margin-top:8px;" data-action="closeMo">Close</button>');return;}
  var rows=list.map(function(p){
    var dg=(p.eyeConsult&&p.eyeConsult.diagnosis)||(p.ncdConsult&&p.ncdConsult.diagnosis)||(p.childConsult&&p.childConsult.diagnosis)||'';
    var locColor={waiting:'#E8A020',triage:'#00695C','eye-consult':'#1565C0','ncd-consult':'#1A6B2A','child-service':'#E8A020',pharmacy:'#6A1B9A',done:'#888'}[p.status]||'#888';
    return '<div class="qi" style="padding:10px 12px;">'
      +'<div class="qn" style="background:#E8F5E9;color:#1A6B2A;font-size:11px;flex-shrink:0;">#'+p.num+'</div>'
      +'<div class="qinfo">'
      +'<div class="qname">'+p.fn+' '+p.ln+'</div>'

  var m={waiting:'#FFF3E0|#E65100',triage:'#E0F2F1|#00695C','eye-consult':'#E3F2FD|#1565C0','ncd-consult':'#E8F5E9|#1A6B2A','child-service':'#FFFBF0|#E8A020',pharmacy:'#F3E5F5|#6A1B9A',done:'#F5F5F5|#888'};
  var p=(m[s]||'#eee|#666').split('|');
  return'<span class="bdg" style="background:'+p[0]+';color:'+p[1]+';">'+s+'</span>';
}
function flowH(p){
  var isC=p.service==='Children Under 5';
  var hasEye=p.service.indexOf('Eye')>=0;
  var hasNcd=p.service.indexOf('NCD')>=0;
  var isMulti=hasEye&&hasNcd;
  var steps,cur;
  if(isC){
    steps=['Reception','Child Service','Pharmacy','&#9989; Done'];
    var sm={waiting:0,'child-service':1,pharmacy:2,done:3};
    cur=sm[p.status]||0;
  } else if(isMulti){
    // Fixed flow: NCD &rarr; Pharmacy &rarr; Eye &rarr; Pharmacy &rarr; Done
    steps=['Reception','Triage','&#129658; NCD','Pharmacy','&#128065; Eye','Pharmacy','&#9989; Done'];
    var ncdDone=!!p.ncdConsult, eyeDone=!!p.eyeConsult;
    var s=p.status;
    cur=s==='waiting'?0:s==='triage'?1:s==='ncd-consult'?2:
        (s==='pharmacy'&&!ncdDone)?3:
        (s==='pharmacy'&&ncdDone&&!eyeDone)?3:
        s==='eye-consult'?4:
        (s==='pharmacy'&&ncdDone&&eyeDone)?5:
        s==='done'?6:0;
    // Refine: after NCD done, pharmacy is step 3; after eye done, pharmacy is step 5
    if(s==='pharmacy'){cur=ncdDone&&eyeDone?5:3;}
    if(s==='done'){cur=6;}
  } else if(hasNcd){
    steps=['Reception','Triage','&#129658; NCD','Pharmacy','&#9989; Done'];
    var sm={waiting:0,triage:1,'ncd-consult':2,pharmacy:3,done:4};
    cur=sm[p.status]||0;
  } else {
    // Eye only
    steps=['Reception','Triage','&#128065; Eye','Pharmacy','&#9989; Done'];
    var sm={waiting:0,triage:1,'eye-consult':2,pharmacy:3,done:4};
    cur=sm[p.status]||0;
  }
  var h='<div class="flow">';
  steps.forEach(function(s,i){
    if(i>0)h+='<span style="color:#aaa;font-size:13px;">&rarr;</span>';
    var cls=i<cur?'fdone':i===cur?'fact':'fwait';
    h+='<span class="fp '+cls+'">'+s+'</span>';
  });
  return h+'</div>';
}

function sbReq(method,path,body,cb){
  var x=new XMLHttpRequest();
  x.open(method,SB+'/rest/v1/'+path,true);
  x.setRequestHeader('apikey',SK);
  x.setRequestHeader('Authorization','Bearer '+SK);
  x.setRequestHeader('Content-Type','application/json');
  if(method==='POST'&&path.indexOf('return=')>=0)x.setRequestHeader('Prefer','return=minimal');
  x.timeout=15000;
  x.onreadystatechange=function(){
    if(x.readyState!==4)return;
    try{cb(x.status,x.responseText&&x.responseText.length>2?JSON.parse(x.responseText):null);}
    catch(e){cb(x.status,null);}
  };
  x.onerror=function(){cb(0,null);};
  x.ontimeout=function(){cb(0,null);};
  x.send(body?JSON.stringify(body):null);
}
function toRow(p){return{id:p.id,num:p.num,id_num:p.idNum||'',first_name:p.fn,last_name:p.ln,age:p.age,dob:p.dob||'',gender:p.gender,phone:p.phone||'',province:p.province||'',district:p.district||'',sector:p.sector||'',cell:p.cell||'',village:p.village||'',parent_name:p.parentName||'',parent_phone:p.parentPhone||'',service:p.service,status:p.status,visit_date:p.date,reg_at:p.regAt||'',triage:p.triage||null,eye_consult:p.eyeConsult||null,ncd_consult:p.ncdConsult||null,child_consult:p.childConsult||null,rx:p.rx||[],pharmacy:p.pharmacy||null,done_at:p.doneAt||null,pending_after_pharm:p.pendingAfterPharm||null,consult_order:p.consultOrder||null};}

  return{id:r.id,num:r.num,idNum:r.id_num||'',fn:r.first_name,ln:r.last_name,age:r.age,dob:r.dob||'',gender:r.gender,phone:r.phone||'',province:r.province||'',district:r.district||'',sector:r.sector||'',cell:r.cell||'',village:r.village||'',parentName:r.parent_name||'',parentPhone:r.parent_phone||'',service:r.service,status:r.status,date:date,regAt:r.reg_at||'',triage:r.triage||null,eyeConsult:r.eye_consult||null,ncdConsult:r.ncd_consult||null,childConsult:r.child_consult||null,rx:r.rx||[],pharmacy:r.pharmacy||null,doneAt:r.done_at||null,pendingAfterPharm:r.pending_after_pharm||null,consultOrder:r.consult_order||null};
}

function sync(){
  sSet('Syncing...');
  var today=td();
  // Query 1: all of today's patients
  sbReq('GET','patients?visit_date=eq.'+today+'&order=num.asc&limit=1000',null,function(s,d){
    if(s===200){
      // Handle both array response and null/empty (empty table = valid 200)
      var rows=Array.isArray(d)?d:[];
      var serverIds=rows.map(function(r){return r.id;});
      var unsaved=pts.filter(function(p){return serverIds.indexOf(p.id)<0&&p._unsaved;});
      pts=rows.map(fromRow).concat(unsaved);
      pts.sort(function(a,b){return(a.num||0)-(b.num||0);});
      svL();sSet('Ready ('+pts.length+')');render();updCnt();
      // Query 2: pending patients from ANY previous date (not today)
      sbReq('GET','patients?visit_date=neq.'+today+'&status=neq.done&order=num.asc&limit=500',null,function(s2,d2){
        if(s2===200){
          var rows2=Array.isArray(d2)?d2:[];
          if(rows2.length){
            var existIds=pts.map(function(p){return p.id;});
            var extra=rows2.map(fromRow).filter(function(p){return existIds.indexOf(p.id)<0;});
            if(extra.length){
              pts=pts.concat(extra);
              pts.sort(function(a,b){return(a.num||0)-(b.num||0);});
              svL();render();updCnt();
            }
          }
          sSet('Ready ('+pts.length+')');
        }
      });
    } else {
      ldL();render();updCnt();
      sSet(s===0?'Offline':'DB Error '+s);
    }
  });
}

function syncS(){
  var today=td();
  sbReq('GET','patients?visit_date=eq.'+today+'&order=num.asc&limit=1000',null,function(s,d){
    if(s===200){
      var rows=Array.isArray(d)?d:[];
      var serverIds=rows.map(function(r){return r.id;});
      var unsaved=pts.filter(function(p){return serverIds.indexOf(p.id)<0&&p._unsaved;});
      var otherDays=pts.filter(function(p){return p.date!==today&&serverIds.indexOf(p.id)<0;});
      pts=rows.map(fromRow).concat(unsaved).concat(otherDays);
      pts.sort(function(a,b){return(a.num||0)-(b.num||0);});
      svL();sSet('Ready ('+pts.length+')');
    }
  });
}

function savePt(p,cb){
  svL(); // save locally immediately

  // Use upsert: POST with Prefer header &#8212; inserts or updates based on id primary key
  var x=new XMLHttpRequest();
  x.open('POST',SB+'/rest/v1/patients',true);
  x.setRequestHeader('apikey',SK);
  x.setRequestHeader('Authorization','Bearer '+SK);
  x.setRequestHeader('Content-Type','application/json');
  x.setRequestHeader('Prefer','resolution=merge-duplicates,return=minimal');
  x.timeout=12000;
  x.onreadystatechange=function(){
    if(x.readyState!==4)return;
    var s=x.status;
    if(s>=200&&s<300){
      sSet('Saved');svL();if(cb)cb();
    } else {
      // Upsert failed &#8212; try plain PATCH
      var x2=new XMLHttpRequest();
      x2.open('PATCH',SB+'/rest/v1/patients?id=eq.'+p.id,true);
      x2.setRequestHeader('apikey',SK);
      x2.setRequestHeader('Authorization','Bearer '+SK);
      x2.setRequestHeader('Content-Type','application/json');
      x2.setRequestHeader('Prefer','return=minimal');
      x2.timeout=12000;
      x2.onreadystatechange=function(){
        if(x2.readyState!==4)return;
        if(x2.status>=200&&x2.status<300){
          sSet('Saved');svL();if(cb)cb();
        } else {
          // Saved locally only
          sSet('Local only - retry push');
          console.error('savePt failed',s,x.responseText);
          if(cb)cb();
        }
      };
      x2.onerror=x2.ontimeout=function(){sSet('Local only');if(cb)cb();};
      x2.send(JSON.stringify(row));
    }
  };
  x.onerror=x.ontimeout=function(){
    sSet('Local only - offline');
    if(cb)cb();
  };
  x.send(JSON.stringify([row]));
}

function calcAge(){
  var d=parseInt(document.getElementById('r_d').value)||0;
  var m=parseInt(document.getElementById('r_m').value)||0;
  var y=parseInt(document.getElementById('r_y').value)||0;
  if(d>0&&m>0&&y>=1900&&y<=new Date().getFullYear()){
    var bd=new Date(y,m-1,d),now=new Date();
    var age=now.getFullYear()-bd.getFullYear();
    var dm=now.getMonth()-bd.getMonth();
    if(dm<0||(dm===0&&now.getDate()<bd.getDate()))age--;
    age=Math.max(0,age);
    var disp=document.getElementById('r_age_disp');
    if(disp)disp.textContent='Age: '+age+' years';
    return age;
  }
  return 0;
}

function showSug(elId,items,onPick){
  var box=document.getElementById(elId);
  if(!box)return;
  if(!items.length){box.innerHTML='';return;}
  box.innerHTML='<div class="sug">'+items.slice(0,8).map(function(v){
    return '<div class="sug-item" onclick="('+onPick.toString()+')(\''+v.replace(/'/g,"\\'")+'\')">'+(v)+'</div>';
  }).join('')+'</div>';
}
function hideSug(elId){setTimeout(function(){var b=document.getElementById(elId);if(b)b.innerHTML='';},200);}

function pvSug(q){
  var all=Object.keys(RW);
  var ql=q.toLowerCase().trim();
  var matches=ql?all.filter(function(p){return p.toLowerCase().indexOf(ql)>=0;}):all;
  showSug('r_pv_sug',matches,function(v){
    document.getElementById('r_pv').value=v;
    document.getElementById('r_pv_sug').innerHTML='';
    // Clear district when province changes
    var dt=document.getElementById('r_dt');if(dt){dt.value='';dt.dispatchEvent(new Event('input'));}
    document.getElementById('r_dt').focus();
  });
}

function dtSug(q){
  var pv=gv('r_pv');
  var ql=q.toLowerCase().trim();
  var all=[];
  if(pv&&RW[pv]){all=Object.keys(RW[pv]);}
  else{Object.values(RW).forEach(function(dists){Object.keys(dists).forEach(function(d){if(all.indexOf(d)<0)all.push(d);});});}
  var matches=ql?all.filter(function(d){return d.toLowerCase().indexOf(ql)>=0;}):all;
  showSug('r_dt_sug',matches,function(v){
    document.getElementById('r_dt').value=v;
    document.getElementById('r_dt_sug').innerHTML='';
    // Auto-fill province if not set
    var pv=gv('r_pv');
    if(!pv){
      Object.keys(RW).forEach(function(province){
        if(RW[province][v])document.getElementById('r_pv').value=province;
      });
    }
    document.getElementById('r_sc').focus();
  });
}

document.addEventListener('click',function(e){

function regPt(){
  var fn=gv('r_fn'),ln=gv('r_ln'),gn=gv('r_gn'),pv=gv('r_pv'),dt=gv('r_dt'),sc=gv('r_sc'),pn=gv('r_pn'),pp=gv('r_pp');
  var al=document.getElementById('r_al');
  var d=parseInt(gv('r_d'))||0,m=parseInt(gv('r_m'))||0,y=parseInt(gv('r_y'))||0;
  var age=0,dob='';
  if(d>0&&m>0&&y>=1900){
    var bd=new Date(y,m-1,d),now=new Date();
    age=now.getFullYear()-bd.getFullYear();
    var dm=now.getMonth()-bd.getMonth();
    if(dm<0||(dm===0&&now.getDate()<bd.getDate()))age--;
    age=Math.max(0,age);
    dob=y+'-'+(m<10?'0':'')+m+'-'+(d<10?'0':'')+d;
  }
  if(!fn||!ln||!gn||!pv||!dt||!sc||!dob||!svArr.length){
    al.className='al aER';al.textContent='Please fill all required fields (including Date of Birth and Sector) and select a service.';return;
  }
  if(svArr.indexOf('c')>=0&&(!pn||!pp)){
    al.className='al aER';al.textContent='Please fill parent/guardian name and phone for Children Under 5.';return;
  }
  var svc=svArr.map(function(s){return s==='e'?'Eye Testing':s==='n'?'NCD Testing':'Children Under 5';}).join(' + ');
  var initSt=svArr.length===1&&svArr[0]==='c'?'child-service':'waiting';

  pts.push(p);svArr=[];
  al.className='al aOK';al.textContent='Saving #'+p.num+'...';
  savePt(p,function(){al.className='al aOK';al.textContent='Patient #'+p.num+' '+fn+' '+ln+' registered!';rRec();});
}

function doneTriage(id){

  p.status=gv('t_next');
  var hasEye=p.service.indexOf('Eye')>=0;
  var hasNcd=p.service.indexOf('NCD')>=0;
  // Always NCD first if patient has both services
  if(hasNcd&&hasEye){
    p.consultOrder=['ncd-consult','eye-consult'];
    p.status='ncd-consult';
  } else if(hasNcd){
    p.consultOrder=['ncd-consult'];
  } else if(hasEye){
    p.consultOrder=['eye-consult'];
  }
  if(p.status==='done')p.doneAt=tn();
  savePt(p,function(){closeMo();rTriage();});
}

function saveEditEye(id){

  p.eyeConsult={
    at:(p.eyeConsult&&p.eyeConsult.at)||tn(),
    chiefComplaint:gv('e_cc'),medHx:gv('e_mhx'),
    vaUnaidedOD:gv('e_va_unod'),vaUnaidedOS:gv('e_va_unos'),
    vaAidedOD:gv('e_va_aidod'),vaAidedOS:gv('e_va_aidos'),
    refSphOD:gv('e_ref_sod'),refCylOD:gv('e_ref_cod'),refAxisOD:gv('e_ref_axod'),refAddOD:gv('e_ref_adod'),
    refSphOS:gv('e_ref_sos'),refCylOS:gv('e_ref_cos'),refAxisOS:gv('e_ref_axos'),refAddOS:gv('e_ref_ados'),
    sleOD:gv('e_sle_od'),sleOS:gv('e_sle_os'),
    retinaOD:gv('e_ret_od'),retinaOS:gv('e_ret_os'),
    iopOD:gv('e_iop_od'),iopOS:gv('e_iop_os'),
    rxSphOD:gv('e_rx_sod'),rxCylOD:gv('e_rx_cod'),rxAxisOD:gv('e_rx_axod'),rxAddOD:gv('e_rx_adod'),
    rxSphOS:gv('e_rx_sos'),rxCylOS:gv('e_rx_cos'),rxAxisOS:gv('e_rx_axos'),rxAddOS:gv('e_rx_ados'),
    glasses:gv('e_gl'),
    diagnosis:getOther('e_diag','e_diag_ot'),notes:gv('e_notes'),doctor:gv('e_dr')
  };
  p.rx=getRx();
  var reroute=gv('e_reroute');
  if(reroute&&reroute!=='keep'){
    p.status=reroute;
    if(reroute==='done')p.doneAt=tn();
    if(reroute==='pharmacy'){
      p.pendingAfterPharm=null;
      var order=p.consultOrder||[];
      var eyeIdx=order.indexOf('eye-consult');
      if(eyeIdx>=0&&order[eyeIdx+1]==='ncd-consult'&&!p.ncdConsult)p.pendingAfterPharm='ncd-consult';
    }
  }
  savePt(p,function(){closeMo();render();});
}

  openMo('<div class="mt">&#129658; '+(isEdit?'Edit NCD Consultation':'NCD Consultation')+' &#8212; '+p.fn+' '+p.ln+' #'+p.num+'</div>'

function saveEditNcd(id){
  var p=byId(id);if(!p)return;
  p.ncdConsult={at:(p.ncdConsult&&p.ncdConsult.at)||tn(),currentMeds:gv('n_meds'),chiefComplaint:gv('n_cc'),pulse:gv('n_pulse'),o2:gv('n_o2'),waist:gv('n_waist'),labs:{malaria:gv('n_mal'),glucose:gv('n_glu2'),hgb:gv('n_hgb'),cholesterol:gv('n_chol'),hiv:gv('n_hiv'),urine:gv('n_uri'),pregnancy:gv('n_preg')},diagnosis:getOther('n_diag','n_diag_ot'),riskLevel:gv('n_risk'),notes:gv('n_notes')};
  p.rx=getRx();
  var reroute=gv('n_reroute');
  if(reroute&&reroute!=='keep'){
    p.status=reroute;
    if(reroute==='done')p.doneAt=tn();
    if(reroute==='pharmacy'){
      p.pendingAfterPharm=null;
      var order=p.consultOrder||[];
      var ncdIdx=order.indexOf('ncd-consult');
      if(ncdIdx>=0&&order[ncdIdx+1]==='eye-consult'&&!p.eyeConsult)p.pendingAfterPharm='eye-consult';
    }
  }
  savePt(p,function(){closeMo();render();});
}

function doneNcd(id){
  var p=byId(id);if(!p)return;
  p.ncdConsult={at:tn(),currentMeds:gv('n_meds'),chiefComplaint:gv('n_cc'),pulse:gv('n_pulse'),o2:gv('n_o2'),waist:gv('n_waist'),labs:{malaria:gv('n_mal'),glucose:gv('n_glu2'),hgb:gv('n_hgb'),cholesterol:gv('n_chol'),hiv:gv('n_hiv'),urine:gv('n_uri'),pregnancy:gv('n_preg')},diagnosis:getOther('n_diag','n_diag_ot'),riskLevel:gv('n_risk'),notes:gv('n_notes')};
  p.rx=(p.rx||[]).concat(getRx());
  // Doctor chooses next step
  var next=gv('n_next_step')||'pharmacy';
  p.status=next;
  p.pendingAfterPharm=null;
  if(next==='done'){
    p.doneAt=tn();
  } else if(next==='pharmacy'){
    // If also has Eye service pending, mark it so pharmacy routes there after dispensing
    var order=p.consultOrder||[];
    var ncdIdx=order.indexOf('ncd-consult');
    if(ncdIdx>=0&&order[ncdIdx+1]==='eye-consult'&&!p.eyeConsult){
      p.pendingAfterPharm='eye-consult';
    }
  }
  // If going directly to Eye (no medication needed at this point)
  savePt(p,function(){closeMo();rNcd();});
}

function discharge(id){
  var p=byId(id);if(!p)return;
  var nextSvc=p.pendingAfterPharm||'';
  p.pharmacy=p.pharmacy||{};

  if(!p.pharmRounds)p.pharmRounds=[];
  p.pharmRounds.push({at:tn(),notes:gv('ph_n'),forService:nextSvc?'pre-'+nextSvc:'final'});
  p.pendingAfterPharm=null;
  if(nextSvc){
    // Send to the next service, not done
    p.status=nextSvc;
    savePt(p,function(){
      closeMo();rPharm();
      var t=document.createElement('div');t.className='toast';
      var lbl=nextSvc==='eye-consult'?'&#128065; Eye Consultation':'&#129658; NCD Consultation';

    });

}

function applyDashFilter(){
  var f=document.getElementById('df_from'),t=document.getElementById('df_to');
  if(f&&t)rDash(f.value,t.value);
}

function setDashPreset(p){
  var d=td(),now=new Date(),f,t=d;
  if(p==='today'){f=d;}
  else if(p==='week'){var day=now.getDay()||7;var mon=new Date(now);mon.setDate(now.getDate()-(day-1));f=mon.toISOString().split('T')[0];}
  else if(p==='month'){f=d.substr(0,7)+'-01';}
  else{// all time &#8212; find earliest patient date
    var dates=pts.map(function(pt){return pt.date;}).filter(Boolean).sort();
    f=dates.length?dates[0]:d;
  }
  rDash(f,t);
}

function clrTd(){

// &#9472;&#9472; EDIT PATIENT &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
function editPt(id){
  var p=byId(id);if(!p)return;
  closeMo();
  var hasEye=!!p.eyeConsult,hasNcd=!!p.ncdConsult,hasChild=!!p.childConsult;
  var n=(hasEye?1:0)+(hasNcd?1:0)+(hasChild?1:0);
  if(n>1)return editChoice(id);
  if(hasEye||p.service.indexOf('Eye')>=0)return openEye(id,true);
  if(hasNcd||p.service.indexOf('NCD')>=0)return openNcd(id,true);
  if(hasChild||p.service==='Children Under 5')return openChild(id,true);
  editPersonal(id);
}

function editChoice(id){
  var p=byId(id);if(!p)return;
  var opts='';
  if(p.eyeConsult)opts+='<button class="btn bB" style="width:100%;padding:11px;margin-bottom:8px;" data-action="editEyeChoice" data-pid="'+p.id+'">&#128065; Edit Eye Consultation</button>';
  if(p.ncdConsult)opts+='<button class="btn bG" style="width:100%;padding:11px;margin-bottom:8px;" data-action="editNcdChoice" data-pid="'+p.id+'">&#129658; Edit NCD Consultation</button>';
  if(p.childConsult)opts+='<button class="btn bO" style="width:100%;padding:11px;margin-bottom:8px;" data-action="editChildChoice" data-pid="'+p.id+'">&#128118; Edit Child Assessment</button>';
  opts+='<button class="btn bsm" style="width:100%;padding:11px;margin-bottom:8px;background:#eee;color:#333;" data-action="editPersonalChoice" data-pid="'+p.id+'">&#9999; Edit Personal Info</button>';
  openMo('<div class="mt">Edit Patient &#8212; '+p.fn+' '+p.ln+' #'+p.num+'</div>'
    +'<div style="font-size:13px;color:#666;margin-bottom:12px;">This patient has multiple records. Which would you like to edit?</div>'
    +opts
    +'<button class="btn bX" style="width:100%;padding:11px;" data-action="closeMo">Cancel</button>');
}

function editPersonal(id){
  var p=byId(id);if(!p)return;
  openMo('<div class="mt">&#9999; Edit Patient &#8212; '+p.fn+' '+p.ln+' #'+p.num+'</div>'
    +'<div class="sh shB" style="margin-bottom:10px;"><h3>Personal Information</h3></div>'
    +'<div class="g2"><div class="f"><label>First Name</label><input type="text" id="ep_fn" value="'+p.fn+'"></div>'
    +'<div class="f"><label>Last Name</label><input type="text" id="ep_ln" value="'+p.ln+'"></div></div>'
    +'<div class="g2"><div class="f"><label>Gender</label><select id="ep_gender"><option'+(p.gender==='Female'?' selected':'')+'>Female</option><option'+(p.gender==='Male'?' selected':'')+'>Male</option></select></div>'
    +'<div class="f"><label>Phone</label><input type="text" id="ep_phone" value="'+(p.phone||'')+'"></div></div>'
    +'<div class="g2"><div class="f"><label>ID Number</label><input type="text" id="ep_id" value="'+(p.idNum||'')+'"></div>'
    +'<div class="f"><label>Age (years)</label><input type="number" id="ep_age" value="'+p.age+'"></div></div>'
    +(p.parentName!==undefined?'<div class="g2"><div class="f"><label>Parent Name</label><input type="text" id="ep_pn" value="'+(p.parentName||'')+'"></div>'
    +'<div class="f"><label>Parent Phone</label><input type="text" id="ep_pp" value="'+(p.parentPhone||'')+'"></div></div>':'')
    +'<div class="sh shB" style="margin-bottom:10px;margin-top:4px;"><h3>&#128205; Address</h3></div>'
    +'<div class="g2"><div class="f"><label>Province</label><input type="text" id="ep_prov" value="'+(p.province||'')+'" placeholder="Type province..." autocomplete="off" oninput="epPvSug(this.value)" onfocus="epPvSug(this.value)"><div id="ep_prov_sug" style="position:relative;"></div></div>'
    +'<div class="f"><label>District</label><input type="text" id="ep_dist" value="'+(p.district||'')+'" placeholder="Type district..." autocomplete="off" oninput="epDtSug(this.value)" onfocus="epDtSug(this.value)"><div id="ep_dist_sug" style="position:relative;"></div></div></div>'
    +'<div class="g2"><div class="f"><label>Sector</label><input type="text" id="ep_sec" value="'+(p.sector||'')+'"></div>'
    +'<div class="f"><label>Cell</label><input type="text" id="ep_cell" value="'+(p.cell||'')+'"></div></div>'
    +'<div class="f"><label>Village</label><input type="text" id="ep_village" value="'+(p.village||'')+'"></div>'
    +'<div class="g2" style="margin-top:12px;">'
    +'<button class="btn bG" data-action="saveEditPersonal" data-pid="'+p.id+'">&#128190; Save Changes</button>'
    +'<button class="btn bX" data-action="closeMo">Cancel</button></div>');
}

function epPvSug(q){
  var all=Object.keys(RW),ql=q.toLowerCase().trim();
  var matches=ql?all.filter(function(p){return p.toLowerCase().indexOf(ql)>=0;}):all;
  showSug('ep_prov_sug',matches,function(v){
    document.getElementById('ep_prov').value=v;
    document.getElementById('ep_prov_sug').innerHTML='';
    document.getElementById('ep_dist').focus();
  });
}
function epDtSug(q){
  var pv=document.getElementById('ep_prov')?document.getElementById('ep_prov').value.trim():'';
  var ql=q.toLowerCase().trim();
  var all=[];
  if(pv&&RW[pv]){all=Object.keys(RW[pv]);}
  else{Object.values(RW).forEach(function(dists){Object.keys(dists).forEach(function(d){if(all.indexOf(d)<0)all.push(d);});});}
  var matches=ql?all.filter(function(d){return d.toLowerCase().indexOf(ql)>=0;}):all;
  showSug('ep_dist_sug',matches,function(v){
    document.getElementById('ep_dist').value=v;
    document.getElementById('ep_dist_sug').innerHTML='';
    if(!pv){Object.keys(RW).forEach(function(pr){if(RW[pr][v])document.getElementById('ep_prov').value=pr;});}
    document.getElementById('ep_sec').focus();
  });
}

function saveEditPersonal(id){
  var p=byId(id);if(!p)return;
  p.fn=gv('ep_fn');p.ln=gv('ep_ln');p.age=gv('ep_age');p.gender=gv('ep_gender');
  p.phone=gv('ep_phone');p.idNum=gv('ep_id');
  p.province=gv('ep_prov');p.district=gv('ep_dist');
  p.sector=gv('ep_sec');p.cell=gv('ep_cell');
  var vl=gv('ep_village');if(vl!==undefined)p.village=vl;
  var pn=gv('ep_pn');if(pn!==undefined)p.parentName=pn;
  var pp=gv('ep_pp');if(pp!==undefined)p.parentPhone=pp;
  savePt(p,function(){closeMo();render();});
}
